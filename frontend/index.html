<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ev. &mdash; Adaptive Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,0,600;9..144,1,300;9..144,1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/app.css"/>
</head>
<body>
  <div class="canvas">

    <!-- ══ GLOBAL LOADER ══ -->
    <div class="ev-loader-overlay" id="globalLoader" style="display:none">
      <div class="ev-loader">ev.</div>
      <div class="ev-loader-sub" id="loaderMsg">Loading&hellip;</div>
      <div class="ev-loader-steps" id="loaderSteps"></div>
    </div>

    <!-- ══ LANDING / AUTH VIEW ══ -->
    <div class="auth-view" id="authView">
      <div class="auth-card panel no-hover" style="padding:2.5rem">

        <!-- Hero -->
        <div style="text-align:center;margin-bottom:2rem">
          <div class="auth-logo" style="margin-bottom:.5rem">ev.</div>
          <div style="font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:1.1rem;color:var(--muted);margin-bottom:.5rem">
            Upload any PDF. Actually understand it.
          </div>
          <div style="font-size:.88rem;color:var(--muted2);line-height:1.6">
            AI-powered summaries, adaptive quizzes, and personalized roadmaps.
          </div>
        </div>

        <!-- Google Sign-In Button -->
        <button class="google-btn" onclick="googleLogin()">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <!-- Divider -->
        <div class="auth-divider">or</div>

        <!-- Dev-Login Fallback Button -->
        <button class="btn btn-dark" style="width:100%;justify-content:center;padding:.85rem" onclick="demoLogin()">
          Try the demo &rarr;
        </button>

        <!-- Privacy Note -->
        <div class="auth-note">
          Your data is encrypted and never used for AI training.
        </div>

      </div>
    </div>

  </div><!-- /canvas -->

  <!-- Footer -->
  <div style="text-align:center;padding:1rem;font-size:.78rem;color:var(--muted2)">
    ev. &mdash; Learn smarter.
  </div>

  <!-- Scripts — order matters -->
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Auto-redirect to app.html if already authenticated
    (function() {
      const token = localStorage.getItem('ev_token');
      const user = JSON.parse(localStorage.getItem('ev_user') || 'null');
      if (token && user) {
        window.location.href = 'app.html';
      }
    })();
  </script>
</body>
</html>
