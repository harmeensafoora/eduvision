<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ev. &mdash; Signing in&hellip;</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,0,600;9..144,1,300;9..144,1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/main.css"/>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: var(--bg-out);
    }
    .callback-card {
      text-align: center;
      padding: 2rem;
    }
    .callback-logo {
      font-family: "Fraunces", serif;
      font-weight: 600;
      font-size: 3rem;
      letter-spacing: -.05em;
      color: var(--ink);
      animation: evPulse 1.2s ease-in-out infinite;
    }
    .callback-message {
      margin-top: 1rem;
      font-size: .95rem;
      font-weight: 500;
      color: var(--muted2);
      animation: evPulse 1.2s .3s ease-in-out infinite;
    }
    .callback-error {
      display: none;
      margin-top: 1.5rem;
      padding: .8rem 1.2rem;
      background: var(--accent);
      border: 1.5px solid var(--ink);
      border-radius: 12px;
      font-size: .88rem;
      font-weight: 600;
      color: var(--ink);
      animation: fadeSlide .3s ease;
    }
    .callback-error.show {
      display: block;
    }
    @keyframes evPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="callback-card">
    <div class="callback-logo">ev.</div>
    <div class="callback-message">Signing you in&hellip;</div>
    <div class="callback-error" id="callbackError"></div>
  </div>

  <script>
    (function() {
      // Extract authorization code from URL
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');

      // If error param present, redirect to index with error
      if (error) {
        window.location.href = '../index.html?error=' + encodeURIComponent(error);
        return;
      }

      // No code — redirect to index with error
      if (!code) {
        window.location.href = '../index.html?error=no_code';
        return;
      }

      // API configuration
      var CONFIG = { API_BASE: 'http://localhost:8000/api' };

      // Exchange authorization code for tokens
      fetch(CONFIG.API_BASE + '/auth/callback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      })
      .then(function(r) {
        if (!r.ok) {
          throw new Error('Token exchange failed');
        }
        return r.json();
      })
      .then(function(d) {
        // Store tokens in localStorage
        localStorage.setItem('ev_token', d.access_token);
        localStorage.setItem('ev_refresh', d.refresh_token || '');
        localStorage.setItem('ev_user', JSON.stringify(d.user));

        // Redirect to app
        window.location.href = '../app.html';
      })
      .catch(function(err) {
        console.error('Auth failed:', err);
        window.location.href = '../index.html?error=auth_failed';
      });
    })();
  </script>
</body>
</html>
